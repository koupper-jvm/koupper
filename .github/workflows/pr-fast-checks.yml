name: PR Fast Checks

on:
  pull_request:
    branches: [develop, main]

jobs:
  fast-checks-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build fast checks
        shell: bash
        run: |
          set -euo pipefail
          ./koupper/gradlew :octopus:compileKotlin
          ./koupper-cli/gradlew compileKotlin
