name: Full Smoke Suite

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]
  workflow_dispatch:

jobs:
  smoke-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Kotlin compiler
        shell: pwsh
        run: choco install kotlin -y

      - name: Verify toolchain
        shell: pwsh
        run: |
          java -version
          kotlinc -version

      - name: Run full smoke suite
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File .\examples\full-smoke-suite.ps1 -ForceInstall
