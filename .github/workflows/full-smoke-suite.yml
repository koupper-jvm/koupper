name: Full Smoke Suite

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
    tags: ['v*']
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * *'

jobs:
  install-uninstall-e2e-windows:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout koupper-cli
        uses: actions/checkout@v4
        with:
          repository: koupper-jvm/koupper-cli
          ref: main
          path: koupper-cli

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Kotlin compiler
        shell: pwsh
        run: |
          $version = "2.0.20"
          $url = "https://github.com/JetBrains/kotlin/releases/download/v$version/kotlin-compiler-$version.zip"
          $zip = Join-Path $env:RUNNER_TEMP "kotlin-compiler.zip"
          $dest = Join-Path $env:RUNNER_TEMP "kotlin"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          "$dest\kotlinc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Koupper
        shell: pwsh
        run: |
          kotlinc -script install.kts -- --force

      - name: Add Koupper bin to PATH
        shell: pwsh
        run: |
          "$env:USERPROFILE\.koupper\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Smoke CLI after install
        shell: pwsh
        run: |
          koupper -v
          koupper provider info command-runner

      - name: Uninstall Koupper
        shell: pwsh
        run: |
          kotlinc -script uninstall.kts -- --force --purge

      - name: Assert uninstall cleanup
        shell: pwsh
        run: |
          if (Test-Path "$env:USERPROFILE\.koupper") {
            throw "Expected ~/.koupper to be removed after uninstall"
          }

  smoke-windows:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout koupper-cli
        uses: actions/checkout@v4
        with:
          repository: koupper-jvm/koupper-cli
          ref: main
          path: koupper-cli

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Kotlin compiler
        shell: pwsh
        run: |
          $version = "2.0.20"
          $url = "https://github.com/JetBrains/kotlin/releases/download/v$version/kotlin-compiler-$version.zip"
          $zip = Join-Path $env:RUNNER_TEMP "kotlin-compiler.zip"
          $dest = Join-Path $env:RUNNER_TEMP "kotlin"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          "$dest\kotlinc\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Verify toolchain
        shell: pwsh
        run: |
          java -version
          kotlinc -version

      - name: Run full smoke suite
        shell: pwsh
        run: |
          kotlinc -script install.kts -- --force
          "$env:USERPROFILE\.koupper\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$env:USERPROFILE\.koupper\bin;$env:PATH"
          koupper help
          koupper provider list
          $smokeScript = Join-Path $env:RUNNER_TEMP "smoke-standalone.kts"
          "import com.koupper.octopus.annotations.Export`n@Export val hello: (String) -> String = { name -> \"hello $name\" }" | Set-Content -Path $smokeScript -Encoding ASCII
          koupper run $smokeScript "CI"

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts-windows
          path: |
            ${{ env.USERPROFILE }}\.koupper\logs\**
          if-no-files-found: ignore

  smoke-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout koupper-cli
        uses: actions/checkout@v4
        with:
          repository: koupper-jvm/koupper-cli
          ref: main
          path: koupper-cli

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Kotlin compiler
        shell: bash
        run: |
          set -euo pipefail
          VERSION="2.0.20"
          URL="https://github.com/JetBrains/kotlin/releases/download/v${VERSION}/kotlin-compiler-${VERSION}.zip"
          ZIP_PATH="$RUNNER_TEMP/kotlin-compiler.zip"
          DEST="$RUNNER_TEMP/kotlin"
          curl -L "$URL" -o "$ZIP_PATH"
          unzip -q "$ZIP_PATH" -d "$DEST"
          echo "$DEST/kotlinc/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        shell: bash
        run: |
          java -version
          kotlinc -version

      - name: Ensure Gradle wrappers are executable
        shell: bash
        run: |
          chmod +x ./gradlew ./koupper-cli/gradlew

      - name: Run full smoke suite
        shell: pwsh
        run: |
          kotlinc -script install.kts -- --force
          "$env:HOME/.koupper/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "$env:HOME/.koupper/bin:$env:PATH"
          koupper help
          koupper provider list
          $smokeScript = Join-Path $env:RUNNER_TEMP "smoke-standalone.kts"
          "import com.koupper.octopus.annotations.Export`n@Export val hello: (String) -> String = { name -> \"hello $name\" }" | Set-Content -Path $smokeScript -Encoding ASCII
          koupper run $smokeScript "CI"

      - name: Upload smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-artifacts-linux
          path: |
            ~/.koupper/logs/**
          if-no-files-found: ignore
