<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="body" x1="0" y1="50" x2="0" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#1e1b4b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1e1b4b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <style>
    .mascot {
      animation: float 4s ease-in-out infinite;
      transform-origin: 200px 200px;
    }
    .eye {
      animation: blink 4.5s infinite;
      transform-origin: 200px 165px;
    }
    .tentacle {
      transform-origin: 200px 180px;
    }
    .t-outer-l { animation: wiggle-left 3.5s ease-in-out infinite; }
    .t-inner-l { animation: wiggle-left 3s ease-in-out infinite 0.2s; }
    .t-mid { animation: bounce-mid 4s ease-in-out infinite 0.5s; }
    .t-inner-r { animation: wiggle-right 3.2s ease-in-out infinite 0.1s; }
    .t-outer-r { animation: wiggle-right 3.8s ease-in-out infinite 0.3s; }
    .dust {
      animation: rise 5s linear infinite;
    }
    .d1 { animation-duration: 5s; animation-delay: 0s; }
    .d2 { animation-duration: 7s; animation-delay: 1.5s; }
    .d3 { animation-duration: 6s; animation-delay: 2.5s; }
    .d4 { animation-duration: 8s; animation-delay: 0.5s; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
    }
    @keyframes blink {
      0%, 94%, 98%, 100% { transform: scaleY(1); }
      96% { transform: scaleY(0.1); }
    }
    @keyframes wiggle-left {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg) translateY(-2px); }
    }
    @keyframes wiggle-right {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-8deg) translateY(-2px); }
    }
    @keyframes bounce-mid {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.93) translateY(-4px); }
    }
    @keyframes rise {
      0% { transform: translateY(0px) scale(0.8); opacity: 0; }
      30% { opacity: 0.8; }
      70% { opacity: 0.8; }
      100% { transform: translateY(-80px) scale(1.2); opacity: 0; }
    }
  </style>

  <circle cx="200" cy="200" r="160" fill="url(#aura)" />

  <g class="mascot">
    <g stroke="url(#body)" stroke-width="36" stroke-linecap="round" fill="none">
      <path d="M 125 190 Q 70 250 95 305" class="tentacle t-outer-l" />
      <path d="M 155 200 Q 130 260 145 315" class="tentacle t-inner-l" />
      <path d="M 275 190 Q 330 250 305 305" class="tentacle t-outer-r" />
      <path d="M 245 200 Q 270 260 255 315" class="tentacle t-inner-r" />
      <path d="M 200 205 Q 200 270 200 325" class="tentacle t-mid" />
    </g>

    <ellipse cx="200" cy="200" rx="80" ry="25" fill="url(#shadow)" />

    <path d="M 110,200 C 110,30 290,30 290,200 C 290,245 110,245 110,200 Z" fill="url(#body)" />

    <path d="M 130,120 C 145,70 255,70 270,120 C 245,100 155,100 130,120 Z" fill="#ffffff" opacity="0.3" filter="url(#softBlur)" />

    <g class="eye">
      <circle cx="165" cy="165" r="14" fill="#0f172a" />
      <circle cx="235" cy="165" r="14" fill="#0f172a" />
    </g>

    <ellipse cx="140" cy="180" rx="12" ry="7" fill="#38bdf8" opacity="0.85" filter="url(#softBlur)"/>
    <ellipse cx="260" cy="180" rx="12" ry="7" fill="#38bdf8" opacity="0.85" filter="url(#softBlur)"/>
  </g>

  <g fill="#38bdf8" opacity="0">
    <circle cx="90" cy="120" r="3.5" class="dust d1" />
    <circle cx="310" cy="160" r="2.5" class="dust d2" />
    <circle cx="140" cy="320" r="3" class="dust d3" />
    <circle cx="290" cy="280" r="2" class="dust d4" />
  </g>
</svg>
