{
  "environments": {
    "dev": {
      "region": "us-east-1",
      "moduleOrder": ["backend", "frontend"],
      "modules": {
        "backend": {
          "enabled": true,
          "type": "backend_lambda",
          "projectPath": "../../my-backend",
          "buildCommand": {
            "windows": ".\\gradlew.bat buildLambda",
            "unix": "./gradlew buildLambda"
          },
          "artifactPath": "build/libs/app-lambda.jar",
          "alias": "dev",
          "lambdas": ["my-api-handler"]
        },
        "frontend": {
          "enabled": true,
          "type": "frontend_static",
          "projectPath": "../../my-frontend",
          "buildCommand": {
            "windows": "npm run build",
            "unix": "npm run build"
          },
          "distPath": "dist",
          "bucket": "example.com",
          "cloudfrontDistributionId": "E000000000000"
        }
      },
      "smoke": {
        "enabled": true,
        "apis": [
          {
            "name": "health",
            "apiGatewayId": "abc1234567",
            "stage": "dev",
            "path": "/health",
            "method": "GET",
            "expectedStatus": [200]
          },
          {
            "name": "newsletter",
            "baseUrl": "https://api.example.com",
            "path": "/newsletter",
            "method": "POST",
            "expectedStatus": [200, 202],
            "body": {
              "email": "smoke@example.com"
            }
          }
        ]
      }
    }
  }
}
